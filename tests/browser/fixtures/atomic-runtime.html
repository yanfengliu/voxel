<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Voxel atomic runtime reference</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #18202a;
      }

      canvas {
        display: block;
        width: 640px;
        height: 480px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import { ThreeRenderRuntime } from '/dist/three/index.js';

      const WIDTH = 640;
      const HEIGHT = 480;

      const paletteSnapshot = (revision, color) => ({
        schemaVersion: 'voxel.render-snapshot/1',
        descriptor: {
          schemaVersion: 'voxel.world/1',
          worldId: 'world:atomic-browser',
          epoch: 'epoch:one',
          coordinates: {
            handedness: 'right',
            upAxis: '+y',
            forwardAxis: '-z',
            chunkRounding: 'floor',
            metersPerWorldUnit: 1,
            worldUnitsPerVoxel: { x: 1, y: 1, z: 1 },
          },
          colorEncoding: 'srgb8-straight-alpha',
          capabilities: ['voxel-chunks'],
          chunkProfile: {
            layout: 'uniform-grid',
            size: { x: 4, y: 1, z: 4 },
            gridOrigin: { x: 0, y: 0, z: 0 },
            emptyPaletteIndex: 0,
            surfaceModel: 'opaque',
            missingNeighbor: 'empty',
          },
          limits: {
            maxResources: 16,
            maxPaletteEntries: 256,
            maxChunks: 16,
            maxBatches: 16,
            maxVoxelsPerChunk: 4096,
            maxGeometryVertices: 4096,
            maxGeometryIndices: 12288,
            maxInstancesPerBatch: 1024,
            maxTotalBytes: 4000000,
          },
        },
        revision,
        resources: [
          {
            kind: 'palette',
            key: 'palette:terrain',
            incarnation: 1,
            revision,
            entries: [
              { color: { r: 0, g: 0, b: 0, a: 0 } },
              { color },
            ],
          },
          {
            kind: 'material',
            key: 'material:terrain',
            incarnation: 1,
            revision: 1,
            shading: 'lambert',
            color: { r: 255, g: 255, b: 255, a: 255 },
            vertexColors: true,
            transparent: false,
            opacity: 1,
            doubleSided: false,
            roughness: 1,
            metalness: 0,
          },
        ],
        chunks: [
          {
            key: 'chunk:0:0:0',
            incarnation: 1,
            revision,
            origin: { x: 0, y: 0, z: 0 },
            size: { x: 4, y: 1, z: 4 },
            paletteKey: 'palette:terrain',
            materialKey: 'material:terrain',
            voxels: new Uint16Array(16).fill(1),
          },
        ],
        batches: [],
      });

      const samplePixelDominance = async (dataUrl) => {
        const blob = await (await fetch(dataUrl)).blob();
        const bitmap = await createImageBitmap(blob);
        const surface = new OffscreenCanvas(bitmap.width, bitmap.height);
        const context = surface.getContext('2d');
        context.drawImage(bitmap, 0, 0);
        const pixels = context.getImageData(0, 0, bitmap.width, bitmap.height).data;
        let greenDominant = 0;
        let redDominant = 0;
        for (let index = 0; index < pixels.length; index += 4) {
          const red = pixels[index];
          const green = pixels[index + 1];
          const blue = pixels[index + 2];
          if (green > 96 && green > red + 24 && green > blue + 24) greenDominant += 1;
          if (red > 96 && red > green + 24 && red > blue + 24) redDominant += 1;
        }
        return { greenDominant, redDominant, pixelCount: pixels.length / 4 };
      };

      const framesUntilPresented = async (runtime, revision, firstFrameIndex, maxFrames) => {
        for (let attempt = 0; attempt < maxFrames; attempt += 1) {
          const frameIndex = firstFrameIndex + attempt;
          const manifest = runtime.frame({
            nowMs: frameIndex * 16,
            deltaMs: 16,
            frameIndex,
          });
          if (manifest && manifest.presentedRevision === revision) {
            return { frames: attempt + 1, nextFrameIndex: frameIndex + 1 };
          }
          await new Promise((resolveDelay) => setTimeout(resolveDelay, 10));
        }
        throw new Error(`Revision ${revision} did not present within ${maxFrames} frames.`);
      };

      const percentile = (values, fraction) => {
        if (values.length === 0) return null;
        const sorted = [...values].sort((left, right) => left - right);
        // Nearest-rank, matching the package's frame-budget reporting.
        const rank = Math.max(1, Math.ceil(fraction * sorted.length));
        return sorted[rank - 1];
      };

      /**
       * V-09 production measurement harness. Records cold worker startup,
       * accepted-to-presented latency, and staging high-water marks against
       * the thresholds the selection ADR fixed before these results existed.
       */
      window.runAtomicRuntimeMeasurements = async ({ coldStarts, warmRevisions }) => {
        const coldMs = [];
        const warmMs = [];
        let peakCpuStagingBytes = 0;
        let peakGpuStagingBytes = 0;
        let peakQueuedJobs = 0;
        let peakQueuedWorkerEvents = 0;

        // The runtime records its own staging high-water, because staging is
        // empty again by the time any sample could read it.
        const observePeaks = (runtime) => {
          const atomic = runtime.metrics().atomic;
          if (!atomic) return;
          peakCpuStagingBytes = Math.max(peakCpuStagingBytes, atomic.peakCpuStagingBytes);
          peakGpuStagingBytes = Math.max(peakGpuStagingBytes, atomic.peakGpuStagingBytes);
          peakQueuedJobs = Math.max(peakQueuedJobs, atomic.highWaterQueuedJobs);
          peakQueuedWorkerEvents = Math.max(peakQueuedWorkerEvents, atomic.highWaterQueuedWorkerEvents);
        };

        // Cold: a fresh runtime per sample, so each pays real module-worker
        // startup. This is the only path that measures worker boot at all.
        for (let sample = 0; sample < coldStarts; sample += 1) {
          const canvas = document.createElement('canvas');
          document.body.appendChild(canvas);
          const runtime = new ThreeRenderRuntime({
            canvas, width: WIDTH, height: HEIGHT, pixelRatio: 1,
            center: { x: 2, y: 0, z: 2 }, zoom: 1,
            voxelWorkersInternal: { workerCount: 1 },
          });
          try {
            const startedAt = performance.now();
            runtime.acceptSnapshot(paletteSnapshot(1, { r: 70, g: 200, b: 80, a: 255 }));
            const present = await framesUntilPresented(runtime, 1, 0, 400);
            coldMs.push(performance.now() - startedAt);
            observePeaks(runtime);
            if (!present) throw new Error('cold sample never presented');
          } finally {
            runtime.dispose();
            canvas.remove();
          }
        }

        // Warm: one runtime whose worker is already up, isolating
        // accepted-to-presented cost from startup.
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const runtime = new ThreeRenderRuntime({
          canvas, width: WIDTH, height: HEIGHT, pixelRatio: 1,
          center: { x: 2, y: 0, z: 2 }, zoom: 1,
          voxelWorkersInternal: { workerCount: 1 },
        });
        try {
          runtime.acceptSnapshot(paletteSnapshot(1, { r: 70, g: 200, b: 80, a: 255 }));
          let frameIndex = (await framesUntilPresented(runtime, 1, 0, 400)).nextFrameIndex;
          for (let revision = 2; revision <= warmRevisions + 1; revision += 1) {
            const green = revision % 2 === 1;
            const startedAt = performance.now();
            runtime.acceptSnapshot(paletteSnapshot(
              revision,
              green ? { r: 70, g: 200, b: 80, a: 255 } : { r: 220, g: 40, b: 40, a: 255 },
            ));
            const present = await framesUntilPresented(runtime, revision, frameIndex, 400);
            warmMs.push(performance.now() - startedAt);
            frameIndex = present.nextFrameIndex;
            observePeaks(runtime);
          }
          return {
            webgl2: true,
            coldStarts: coldMs.length,
            warmRevisions: warmMs.length,
            coldP50Ms: percentile(coldMs, 0.5),
            coldP95Ms: percentile(coldMs, 0.95),
            coldMaxMs: Math.max(...coldMs),
            warmP50Ms: percentile(warmMs, 0.5),
            warmP95Ms: percentile(warmMs, 0.95),
            warmMaxMs: Math.max(...warmMs),
            peakCpuStagingBytes,
            peakGpuStagingBytes,
            peakQueuedJobs,
            peakQueuedWorkerEvents,
            presentedRevision: runtime.metrics().presentedRevision,
          };
        } finally {
          runtime.dispose();
          canvas.remove();
        }
      };

      /**
       * Real-GPU endurance. Only a live context can prove a retired bundle's
       * resources were actually freed: a superseded bundle leaves the scene
       * graph either way, so the renderer's own live geometry count is the
       * only ground truth for a disposal leak.
       */
      window.runAtomicRuntimeEndurance = async ({ edits, settleAfter }) => {
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const runtime = new ThreeRenderRuntime({
          canvas,
          width: WIDTH,
          height: HEIGHT,
          pixelRatio: 1,
          center: { x: 2, y: 0, z: 2 },
          zoom: 1,
          voxelWorkersInternal: { workerCount: 1 },
        });
        const samples = [];
        let settled = null;
        try {
          let frameIndex = 0;
          for (let revision = 1; revision <= edits; revision += 1) {
            // Alternate the palette so every revision is a genuine remesh
            // producing new geometry, not a reused bundle.
            const green = revision % 2 === 1;
            const accepted = runtime.acceptSnapshot(paletteSnapshot(
              revision,
              green
                ? { r: 70, g: 200, b: 80, a: 255 }
                : { r: 220, g: 40, b: 40, a: 255 },
            ));
            if (accepted.status !== 'accepted') {
              throw new Error(`revision ${revision} rejected: ${accepted.code}`);
            }
            const present = await framesUntilPresented(runtime, revision, frameIndex, 200);
            frameIndex = present.nextFrameIndex;
            const metrics = runtime.metrics();
            if (revision === settleAfter) {
              settled = {
                rendererGeometries: metrics.rendererGeometries,
                rendererTextures: metrics.rendererTextures,
                atomic: metrics.atomic,
              };
            }
            if (revision % Math.max(1, Math.floor(edits / 4)) === 0 || revision === edits) {
              samples.push({
                revision,
                rendererGeometries: metrics.rendererGeometries,
                rendererTextures: metrics.rendererTextures,
                atomic: metrics.atomic,
              });
            }
          }
          const finalMetrics = runtime.metrics();
          return {
            webgl2: runtime.getCapabilities().webgl2 ?? true,
            edits,
            settled,
            samples,
            presentedRevision: finalMetrics.presentedRevision,
            state: runtime.runtimeStatus().state,
          };
        } finally {
          runtime.dispose();
          canvas.remove();
        }
      };

      window.runAtomicRuntimeEvidence = async () => {
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const runtime = new ThreeRenderRuntime({
          canvas,
          width: WIDTH,
          height: HEIGHT,
          pixelRatio: 1,
          center: { x: 2, y: 0, z: 2 },
          zoom: 1,
          voxelWorkersInternal: { workerCount: 1 },
        });
        try {
          const greenAcceptance = runtime.acceptSnapshot(
            paletteSnapshot(1, { r: 70, g: 200, b: 80, a: 255 }),
          );
          const beforeFirstPresent = runtime.metrics();
          const firstPresent = await framesUntilPresented(runtime, 1, 0, 200);
          const greenCapture = runtime.capture();
          const greenPixels = await samplePixelDominance(greenCapture.dataUrl);
          const presentedGreen = runtime.metrics();

          const redAcceptance = runtime.acceptSnapshot(
            paletteSnapshot(2, { r: 220, g: 40, b: 40, a: 255 }),
          );
          // No frame has run since acceptance, so the visible canvas must
          // still show the prior revision while workers mesh the new one.
          const midFlightCapture = runtime.capture();
          const midFlightPixels = await samplePixelDominance(midFlightCapture.dataUrl);
          const midFlightMetrics = runtime.metrics();

          const secondPresent = await framesUntilPresented(
            runtime,
            2,
            firstPresent.nextFrameIndex,
            200,
          );
          const redCapture = runtime.capture();
          const redPixels = await samplePixelDominance(redCapture.dataUrl);
          const presentedRed = runtime.metrics();

          const liveRendererInfo = {
            geometries: runtime.metrics().rendererGeometries,
            textures: runtime.metrics().rendererTextures,
          };
          runtime.dispose();
          let postDisposeFrameError = null;
          try {
            runtime.frame({ nowMs: 0, deltaMs: 16, frameIndex: 9999 });
          } catch (error) {
            postDisposeFrameError = String(error && error.message ? error.message : error);
          }
          runtime.dispose();
          const disposedMetrics = runtime.metrics();

          return {
            webgl2: canvas.getContext('webgl2') !== null,
            greenAcceptance: { status: greenAcceptance.status },
            redAcceptance: { status: redAcceptance.status },
            beforeFirstPresent: {
              presentedRevision: beforeFirstPresent.presentedRevision,
              acceptedRevision: beforeFirstPresent.acceptedRevision,
            },
            firstPresent,
            greenPixels,
            presentedGreen: {
              presentedRevision: presentedGreen.presentedRevision,
              frames: presentedGreen.frames,
              drawCalls: presentedGreen.drawCalls,
              triangles: presentedGreen.triangles,
            },
            midFlightPixels,
            midFlightMetrics: {
              presentedRevision: midFlightMetrics.presentedRevision,
              acceptedRevision: midFlightMetrics.acceptedRevision,
            },
            midFlightCaptureRevision: midFlightCapture.presentedRevision,
            secondPresent,
            redPixels,
            presentedRed: {
              presentedRevision: presentedRed.presentedRevision,
              frames: presentedRed.frames,
            },
            liveRendererInfo,
            postDisposeFrameError,
            disposedMetrics: {
              state: disposedMetrics.state,
              rendererGeometries: disposedMetrics.rendererGeometries,
            },
          };
        } finally {
          canvas.remove();
        }
      };
    </script>
  </body>
</html>
