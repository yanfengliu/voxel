<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>voxel model studio</title>
    <style>
      :root {
        color-scheme: dark;
        --ground: #14171a;
        --panel: #1b1f23;
        --line: #2a3038;
        --text: #e6edf3;
        --muted: #8b98a5;
        --accent: #5ac878;
        --bad: #e5786a;
        --check-a: #24292e;
        --check-b: #1b1f23;
      }
      body {
        margin: 0;
        background: var(--ground);
        color: var(--text);
        font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #studio {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 20px 48px;
        display: grid;
        gap: 16px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .stage {
        /* These captures carry alpha; transparency is read against a checker in
           every compositor, so the model's silhouette is legible at its edges. */
        background-image:
          linear-gradient(45deg, var(--check-b) 25%, transparent 25%),
          linear-gradient(-45deg, var(--check-b) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, var(--check-b) 75%),
          linear-gradient(-45deg, transparent 75%, var(--check-b) 75%);
        background-size: 16px 16px;
        background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        background-color: var(--check-a);
        border: 1px solid var(--line);
        border-radius: 6px;
        display: grid;
        place-items: center;
        padding: 12px;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
        max-width: 100%;
      }
      .columns {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
        align-items: start;
      }
      .card {
        display: grid;
        gap: 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 14px;
      }
      .card h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--muted);
        margin: 0;
        font-weight: 600;
      }
      .field { display: grid; gap: 4px; font-size: 12.5px; color: var(--muted); }
      .field small { color: var(--muted); opacity: 0.75; font-size: 11.5px; line-height: 1.4; }
      .layer-label {
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
        font-size: 11.5px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .slider { width: 100%; accent-color: var(--accent); }
      .swatches { display: flex; flex-wrap: wrap; gap: 5px; }
      .swatch {
        width: 26px;
        height: 26px;
        border-radius: 4px;
        border: 1px solid var(--line);
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        padding: 0;
      }
      .swatch[aria-pressed="true"] { outline: 2px solid var(--accent); outline-offset: 1px; }
      .swatch.add { background: var(--ground); color: var(--text); }
      .grid { display: grid; gap: 2px; }
      .cell {
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 2px;
        padding: 0;
        cursor: pointer;
        min-width: 0;
      }
      .cell:hover { border-color: var(--accent); }
      .primary { border-color: var(--accent); }
      .row { display: flex; gap: 6px; flex-wrap: wrap; }
      .genome {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
        font-size: 11.5px;
        background: var(--sunk, #101315);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 8px;
        resize: vertical;
      }
      .sheet {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--sunk, #101315);
        image-rendering: pixelated;
      }
      button {
        font: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 5px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .scrub { flex: 1; min-width: 160px; accent-color: var(--accent); }
      .readout {
        margin: 0;
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
        font-size: 12.5px;
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        white-space: pre;
        overflow-x: auto;
      }
      .verdict {
        margin: 0;
        font-size: 13px;
        border-left: 2px solid var(--line);
        padding-left: 12px;
        color: var(--muted);
      }
      .verdict[data-tone="ok"] { border-left-color: var(--accent); color: var(--text); }
      .verdict[data-tone="bad"] { border-left-color: var(--bad); color: var(--text); }
      .hint {
        margin: 0;
        font-size: 12.5px;
        color: var(--muted);
      }
      code {
        font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div id="studio">
      <h1>voxel model studio</h1>
      <p class="hint">
        Every control here calls <code>window.voxelStudio</code> &mdash; the same
        API the agent drives headlessly. Nothing this page can do is invisible to
        it.
      </p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
