name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  FORCE_COLOR: '0'

jobs:
  node-22-complete:
    name: Node 22 complete (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium and Linux browser dependencies
        if: runner.os == 'Linux'
        run: npm run test:browser:install -- --with-deps

      - name: Install Chromium
        if: runner.os == 'Windows'
        run: npm run test:browser:install

      - name: Run complete verification gate
        run: npm run verify

  node-24-portable:
    name: Node 24 portable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify public API compatibility
        run: npm run test:api --if-present

      - name: Verify packed portable consumer
        run: npm run test:core-only-package

  audit-and-package:
    name: Audit and package (ubuntu-latest, Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Audit runtime dependencies
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm audit --audit-level=high

      - name: Inspect package contents
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: npm pack --dry-run
